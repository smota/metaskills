<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Telemetry Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .drop-zone { border: 2px dashed #ccc; padding: 2rem; text-align: center; margin-bottom: 2rem; cursor: pointer; }
        .drop-zone.dragover { border-color: #0066cc; background: #e6f2ff; }
        #output { background: #f5f5f5; padding: 1rem; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Skill Telemetry Dashboard</h1>
    <div class="drop-zone" id="dropZone">
        Drop your feedback.jsonl or telemetry.jsonl file here, or click to select
        <input type="file" id="fileInput" style="display: none;" accept=".jsonl,.json">
    </div>
    <h2>Recent Logs</h2>
    <div id="output">No data loaded yet.</div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n').filter(l => l.trim());
                try {
                    const parsed = lines.map(JSON.parse);
                    output.textContent = JSON.stringify(parsed, null, 2);
                } catch (err) {
                    output.textContent = "Error parsing JSONL: " + err.message;
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
